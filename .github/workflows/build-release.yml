name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Auto-increment version
        id: package_version
        run: |
          # Read current version
          $package = Get-Content package.json | ConvertFrom-Json
          $version = $package.version
          
          # Split version (e.g., 1.0.1 -> 1, 0, 1)
          $parts = $version -split '\.'
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2]
          
          # Increment patch version
          $patch++
          $newVersion = "$major.$minor.$patch"
          
          # Update package.json
          $package.version = $newVersion
          $package | ConvertTo-Json -Depth 100 | Set-Content package.json
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Commit and push version bump
          git add package.json
          git commit -m "chore: bump version to $newVersion [skip ci]"
          git push
          
          # Output version
          echo "version=$newVersion" >> $env:GITHUB_OUTPUT
          echo "tag=v$newVersion" >> $env:GITHUB_OUTPUT
      
      - name: Install dependencies (fast)
        run: npm ci --prefer-offline --no-audit
      
      - name: Build Vite app (production)
        run: npm run build
        env:
          NODE_ENV: production
      
      - name: Build Electron app (optimized)
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_BUILDER_COMPRESSION_LEVEL: 0
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KaizerIDE-Windows-x64-v${{ steps.package_version.outputs.version }}
          path: |
            release/*.exe
          retention-days: 30
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.package_version.outputs.tag }}
          name: KaizerIDE v${{ steps.package_version.outputs.version }}
          files: |
            release/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## KaizerIDE v${{ steps.package_version.outputs.version }}
            
            ### 🚀 What's New
            Auto-generated release from commit ${{ github.sha }}
            
            ### 📦 Download
            Download the installer below and run it to install KaizerIDE.
            
            ### ✨ Features
            - Windows context menu integration
            - Dark mode installer
            - AI-powered coding assistant
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
